AllCops:
  NewCops: enable
  TargetRubyVersion: 3.2
  Exclude:
    - 'vendor/**/*'
  SuggestExtensions: false

Style/Documentation:
  Enabled: false

Metrics/MethodLength:
  Max: 30

Metrics/AbcSize:
  Max: 40

Metrics/BlockLength:
  Enabled: false

Metrics/ClassLength:
  Exclude:
    - 'test/**/*'

Naming/VariableNumber:
  Enabled: false

Gemspec/DevelopmentDependencies:
  Enabled: false
